<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Journal</title>
  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === Variables === */
    :root {
      --bg-shell:   #1a1714;
      --bg-sidebar: #211e1b;
      --bg-paper:   #f5f0e8;
      --ink:        #1c1a17;
      --gold:       #c9a84c;
      --gold-dim:   #a8873c;
      --muted:      #8a7f72;
      --error:      #c0392b;
      --sidebar-w:  240px;
      --transition: 250ms ease;
    }

    body {
      font-family: 'Courier New', monospace;
      background: var(--bg-shell);
      color: var(--muted);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* === Views === */
    .view { display: none; width: 100%; height: 100%; }
    .view.active { display: flex; }

    /* === Login View === */
    #view-login {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
    }

    .login-card {
      background: var(--bg-sidebar);
      border: 1px solid #2e2a26;
      border-radius: 4px;
      padding: 48px 40px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-logo {
      text-align: center;
      font-size: 22px;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .login-subtitle {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: -12px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      background: #171412;
      border: 1px solid #2e2a26;
      border-radius: 3px;
      color: #d4cec6;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 10px 40px 10px 12px;
      outline: none;
      transition: border-color var(--transition);
    }

    .input-wrap input:focus { border-color: var(--gold); }

    .toggle-pw {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      padding: 4px;
      line-height: 1;
    }

    .btn-primary {
      background: var(--gold);
      color: #1a1714;
      border: none;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.08em;
      padding: 11px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background var(--transition);
      width: 100%;
    }
    .btn-primary:hover { background: var(--gold-dim); }

    .login-error {
      color: var(--error);
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    /* === Main App View === */
    #view-app {
      flex-direction: row;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-width: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid #2a2521;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width var(--transition);
      flex-shrink: 0;
    }
    .sidebar.collapsed { width: 40px; }

    .sidebar-top {
      display: flex;
      align-items: center;
      padding: 10px 8px;
      border-bottom: 1px solid #2a2521;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 3px;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      transition: color var(--transition);
    }
    .icon-btn:hover { color: var(--gold); }

    .sidebar-search {
      flex: 1;
      background: #171412;
      border: 1px solid #2e2a26;
      border-radius: 3px;
      color: #d4cec6;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
      min-width: 0;
    }
    .sidebar-search:focus { border-color: var(--gold); }

    .sidebar-new {
      margin: 10px 10px 6px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 7px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .sidebar-new:hover { background: var(--gold); color: #1a1714; }

    .entry-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .entry-list::-webkit-scrollbar { width: 4px; }
    .entry-list::-webkit-scrollbar-thumb { background: #2e2a26; border-radius: 2px; }

    .entry-item {
      padding: 10px 12px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background var(--transition), border-color var(--transition);
      overflow: hidden;
    }
    .entry-item:hover { background: #2a2521; }
    .entry-item.active { background: #2a2521; border-left-color: var(--gold); }

    .entry-item-title {
      font-size: 12px;
      color: #c8c0b6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .entry-item-meta {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .sidebar-bottom {
      border-top: 1px solid #2a2521;
      padding: 8px;
    }

    /* Canvas */
    .canvas {
      flex: 1;
      background: var(--bg-shell);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      background: #1e1b18;
      border-bottom: 1px solid #2a2521;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .toolbar-sep {
      width: 1px;
      height: 18px;
      background: #2e2a26;
      margin: 0 4px;
    }

    .tool-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 3px;
      font-size: 13px;
      font-family: Georgia, serif;
      line-height: 1;
      transition: color var(--transition), background var(--transition);
    }
    .tool-btn:hover { color: var(--gold); background: #2a2521; }
    .tool-btn.active { color: var(--gold); background: #2a2521; }

    .word-count-display {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Paper area */
    .paper-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 80px;
    }
    .paper-area::-webkit-scrollbar { width: 6px; }
    .paper-area::-webkit-scrollbar-thumb { background: #2e2a26; border-radius: 3px; }

    .paper {
      background: var(--bg-paper);
      width: 100%;
      max-width: 720px;
      min-height: calc(100vh - 120px);
      padding: 60px 80px;
      box-shadow:
        0 1px 1px rgba(0,0,0,.10),
        0 2px 4px rgba(0,0,0,.12),
        0 4px 16px rgba(0,0,0,.20),
        0 8px 32px rgba(0,0,0,.16);
      position: relative;
    }

    .paper-title {
      font-family: Georgia, 'Palatino Linotype', serif;
      font-size: 28px;
      font-weight: normal;
      color: var(--ink);
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .paper-title:empty::before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    .paper-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }

    .paper-body {
      font-family: Georgia, 'Palatino Linotype', serif;
      font-size: 17px;
      line-height: 1.85;
      color: var(--ink);
      outline: none;
      min-height: 400px;
    }
    .paper-body:empty::before {
      content: attr(data-placeholder);
      color: #aaa;
      pointer-events: none;
    }

    .save-status {
      position: fixed;
      bottom: 24px;
      right: 32px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--muted);
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 400ms ease;
    }
    .save-status.visible { opacity: 1; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      flex-direction: column;
      gap: 12px;
    }
    .empty-state .hint { font-size: 11px; opacity: 0.6; }
  </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="view-login" class="view active">
  <div class="login-card">
    <div class="login-logo">Lumina</div>
    <div class="login-subtitle">Private Journal</div>

    <div id="login-fields">
      <!-- populated by JS based on auth status -->
    </div>

    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- MAIN APP VIEW -->
<div id="view-app" class="view">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="icon-btn" id="btn-toggle-sidebar" title="Toggle sidebar">&#9776;</button>
      <input class="sidebar-search" id="search-input" type="text" placeholder="Search..." />
    </div>
    <button class="sidebar-new" id="btn-new-entry">+ New Entry</button>
    <div class="entry-list" id="entry-list"></div>
    <div class="sidebar-bottom">
      <button class="icon-btn" id="btn-lock" title="Lock journal (Ctrl+L)">&#128274; Lock</button>
    </div>
  </aside>

  <!-- Writing canvas -->
  <div class="canvas">
    <div class="toolbar" id="toolbar">
      <button class="tool-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="tool-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="tool-btn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" data-cmd="h1" title="Heading 1">H1</button>
      <button class="tool-btn" data-cmd="h2" title="Heading 2">H2</button>
      <button class="tool-btn" data-cmd="h3" title="Heading 3">H3</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" data-cmd="insertUnorderedList" title="Bullet list">&#8226; List</button>
      <button class="tool-btn" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
      <span class="word-count-display" id="toolbar-wc">0 words</span>
    </div>

    <div class="paper-area" id="paper-area">
      <div id="empty-state" class="empty-state">
        <div>No entry selected</div>
        <div class="hint">Create a new entry or select one from the sidebar</div>
      </div>
      <div id="paper" class="paper" style="display:none">
        <div
          id="paper-title"
          class="paper-title"
          contenteditable="true"
          data-placeholder="Untitled"
        ></div>
        <div class="paper-meta" id="paper-meta"></div>
        <div
          id="paper-body"
          class="paper-body"
          contenteditable="true"
          data-placeholder="Begin writing..."
        ></div>
      </div>
    </div>
  </div>

</div>

<div class="save-status" id="save-status">Saved &#10003;</div>

<script type="module">
// ============================================================
// STATE
// ============================================================
const state = {
  token: sessionStorage.getItem("token") || null,
  entries: [],
  activeId: null,
  saveTimer: null,
  dirty: false,
};

// ============================================================
// API
// ============================================================
async function api(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  if (state.token) opts.headers["Authorization"] = `Bearer ${state.token}`;
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ============================================================
// LOGIN / SETUP
// ============================================================
async function initAuth() {
  const { setup, locked } = await api("GET", "/api/auth/status");
  renderLoginForm(setup);
}

function renderLoginForm(isSetup) {
  const container = document.getElementById("login-fields");
  container.innerHTML = "";

  if (!isSetup) {
    container.innerHTML = `
      <div class="input-wrap">
        <input type="password" id="pw1" placeholder="Create master password" autocomplete="new-password" />
        <button class="toggle-pw" type="button" onclick="togglePw('pw1')">&#128065;</button>
      </div>
      <div class="input-wrap">
        <input type="password" id="pw2" placeholder="Confirm password" autocomplete="new-password" />
        <button class="toggle-pw" type="button" onclick="togglePw('pw2')">&#128065;</button>
      </div>
      <button class="btn-primary" id="btn-submit">Create Journal</button>
    `;
    document.getElementById("btn-submit").onclick = doSetup;
  } else {
    container.innerHTML = `
      <div class="input-wrap">
        <input type="password" id="pw1" placeholder="Master password" autocomplete="current-password" />
        <button class="toggle-pw" type="button" onclick="togglePw('pw1')">&#128065;</button>
      </div>
      <button class="btn-primary" id="btn-submit">Unlock Journal</button>
    `;
    document.getElementById("btn-submit").onclick = doLogin;
    document.getElementById("pw1").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  }
  document.getElementById("pw1").focus();
}

window.togglePw = function(id) {
  const el = document.getElementById(id);
  el.type = el.type === "password" ? "text" : "password";
};

function setLoginError(msg) {
  document.getElementById("login-error").textContent = msg;
}

async function doSetup() {
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  if (!pw1) return setLoginError("Password cannot be empty.");
  if (pw1 !== pw2) return setLoginError("Passwords do not match.");
  try {
    const { token } = await api("POST", "/api/auth/setup", { password: pw1 });
    onLoginSuccess(token);
  } catch (e) {
    setLoginError(e.error || "Setup failed.");
  }
}

async function doLogin() {
  const pw = document.getElementById("pw1").value;
  try {
    const { token } = await api("POST", "/api/auth/login", { password: pw });
    onLoginSuccess(token);
  } catch (e) {
    setLoginError("Invalid password.");
    document.getElementById("pw1").value = "";
    document.getElementById("pw1").focus();
  }
}

function onLoginSuccess(token) {
  state.token = token;
  sessionStorage.setItem("token", token);
  showView("view-app");
  loadEntries();
}

// ============================================================
// ENTRIES
// ============================================================
async function loadEntries(query = "") {
  try {
    const path = query ? `/api/entries/search?q=${encodeURIComponent(query)}` : "/api/entries";
    state.entries = await api("GET", path);
    renderEntryList();
  } catch (e) {
    if (e.status === 401) doLock();
  }
}

function renderEntryList() {
  const list = document.getElementById("entry-list");
  list.innerHTML = "";
  if (state.entries.length === 0) {
    list.innerHTML = `<div style="padding:12px;font-size:11px;color:var(--muted);text-align:center">No entries</div>`;
    return;
  }
  state.entries.forEach(e => {
    const item = document.createElement("div");
    item.className = "entry-item" + (e.id === state.activeId ? " active" : "");
    item.dataset.id = e.id;
    const date = new Date(e.updated_at).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    item.innerHTML = `
      <div class="entry-item-title">${escHtml(e.title || "Untitled")}</div>
      <div class="entry-item-meta">
        <span>${date}</span>
        <span>${e.word_count}w</span>
      </div>
    `;
    item.onclick = () => openEntry(e.id);
    list.appendChild(item);
  });
}

async function openEntry(id) {
  if (state.dirty) await saveCurrentEntry();
  try {
    const entry = await api("GET", `/api/entries/${id}`);
    state.activeId = id;
    state.dirty = false;
    renderEntry(entry);
    renderEntryList();
  } catch (e) {
    if (e.status === 401) doLock();
  }
}

function renderEntry(entry) {
  document.getElementById("empty-state").style.display = "none";
  const paper = document.getElementById("paper");
  paper.style.display = "block";

  const titleEl = document.getElementById("paper-title");
  titleEl.textContent = entry.title || "";

  document.getElementById("paper-body").innerHTML = entry.body || "";

  const date = new Date(entry.created_at).toLocaleDateString("en-US", {
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  });
  document.getElementById("paper-meta").textContent = `${date} \u2022 ${entry.word_count} words`;
  updateWordCount();
}

async function newEntry() {
  if (state.dirty) await saveCurrentEntry();
  try {
    const { id } = await api("POST", "/api/entries", {
      title: "Untitled",
      body: "",
      word_count: 0,
    });
    await loadEntries();
    await openEntry(id);
    document.getElementById("paper-title").focus();
  } catch (e) {
    if (e.status === 401) doLock();
  }
}

async function saveCurrentEntry() {
  if (!state.activeId) return;
  const title = document.getElementById("paper-title").textContent.trim() || "Untitled";
  const body = document.getElementById("paper-body").innerHTML;
  const wc = countWords(document.getElementById("paper-body").innerText);
  showSaveStatus("Saving\u2026");
  try {
    await api("PUT", `/api/entries/${state.activeId}`, { title, body, word_count: wc });
    state.dirty = false;
    await loadEntries();
    showSaveStatus("Saved \u2713");
  } catch (e) {
    if (e.status === 401) doLock();
  }
}

// ============================================================
// TOOLBAR + FORMATTING
// ============================================================
document.querySelectorAll(".tool-btn[data-cmd]").forEach(btn => {
  btn.addEventListener("mousedown", e => {
    e.preventDefault(); // keep editor focus
    const cmd = btn.dataset.cmd;
    if (cmd === "h1" || cmd === "h2" || cmd === "h3") {
      document.execCommand("formatBlock", false, cmd);
    } else {
      document.execCommand(cmd, false, null);
    }
    updateToolbarState();
  });
});

function updateToolbarState() {
  document.querySelectorAll(".tool-btn[data-cmd]").forEach(btn => {
    const cmd = btn.dataset.cmd;
    let active = false;
    if (cmd === "h1" || cmd === "h2" || cmd === "h3") {
      active = document.queryCommandValue("formatBlock") === cmd;
    } else {
      try { active = document.queryCommandState(cmd); } catch {}
    }
    btn.classList.toggle("active", active);
  });
}

document.addEventListener("selectionchange", updateToolbarState);

// ============================================================
// WORD COUNT
// ============================================================
function countWords(text) {
  return (text.trim().match(/\S+/g) || []).length;
}

function updateWordCount() {
  const text = document.getElementById("paper-body")?.innerText || "";
  const wc = countWords(text);
  document.getElementById("toolbar-wc").textContent = `${wc} word${wc !== 1 ? "s" : ""}`;
  const meta = document.getElementById("paper-meta");
  if (meta.textContent) {
    meta.textContent = meta.textContent.replace(/\d+ words?/, `${wc} word${wc !== 1 ? "s" : ""}`);
  }
}

// ============================================================
// AUTO-SAVE
// ============================================================
function scheduleAutoSave() {
  state.dirty = true;
  clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(saveCurrentEntry, 1500);
}

document.getElementById("paper-title").addEventListener("input", scheduleAutoSave);
document.getElementById("paper-body").addEventListener("input", () => {
  scheduleAutoSave();
  updateWordCount();
});

// ============================================================
// SAVE STATUS TOAST
// ============================================================
let saveStatusTimer;
function showSaveStatus(msg) {
  const el = document.getElementById("save-status");
  el.textContent = msg;
  el.classList.add("visible");
  clearTimeout(saveStatusTimer);
  if (msg.includes("\u2713")) {
    saveStatusTimer = setTimeout(() => el.classList.remove("visible"), 2000);
  }
}

// ============================================================
// SIDEBAR COLLAPSE
// ============================================================
const sidebar = document.getElementById("sidebar");

document.getElementById("btn-toggle-sidebar").onclick = () => {
  const collapsed = sidebar.classList.toggle("collapsed");
  localStorage.setItem("sidebar-collapsed", collapsed ? "1" : "0");
};

if (localStorage.getItem("sidebar-collapsed") === "1") {
  sidebar.classList.add("collapsed");
}

// ============================================================
// SEARCH
// ============================================================
let searchTimer;
document.getElementById("search-input").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadEntries(e.target.value), 300);
});

// ============================================================
// LOCK
// ============================================================
async function doLock() {
  try { await api("POST", "/api/auth/logout"); } catch {}
  state.token = null;
  state.activeId = null;
  state.dirty = false;
  sessionStorage.removeItem("token");
  document.getElementById("paper").style.display = "none";
  document.getElementById("empty-state").style.display = "flex";
  showView("view-login");
  initAuth();
}

document.getElementById("btn-lock").onclick = doLock;

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener("keydown", e => {
  if (e.ctrlKey) {
    switch (e.key) {
      case "s": e.preventDefault(); saveCurrentEntry(); break;
      case "n": e.preventDefault(); newEntry(); break;
      case "l": e.preventDefault(); doLock(); break;
    }
  }
  if (e.key === "Escape") {
    document.querySelectorAll(".dropdown.open").forEach(d => d.classList.remove("open"));
  }
});

// ============================================================
// NEW ENTRY BUTTON
// ============================================================
document.getElementById("btn-new-entry").onclick = newEntry;

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ============================================================
// INIT
// ============================================================
(async () => {
  if (state.token) {
    // Try to resume session
    try {
      await api("GET", "/api/entries");
      showView("view-app");
      loadEntries();
    } catch {
      state.token = null;
      sessionStorage.removeItem("token");
      showView("view-login");
      initAuth();
    }
  } else {
    showView("view-login");
    initAuth();
  }
})();
</script>
</body>
</html>
